# ByteTrack 目标追踪（与 model_zoo/cv examples/bytetrack 一致）
model_path: ~/.cache/models/vision/yolov8/yolov8n.q.onnx
test_video: ~/.cache/assets/video/003_palace.mp4
image_size: [640, 640]
label_file_path: assets/labels/coco.txt
class: deploy.bytetrack.ByteTrackTracker
default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  track_buffer: 30
  frame_rate: 30
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
